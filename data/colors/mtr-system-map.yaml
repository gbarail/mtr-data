      $ref: '#/color_names/dark_green'
  DRL:
    full_name: Disneyland Resort Line
    color:
      $ref: '#/color_names/pink'
  EAL:
    full_name: East Rail Line
    color:
      $ref: '#/color_names/blue'
  HSR:
    full_name: High Speed Rail
    color:
      $ref: '#/color_names/dark_grey'
  ISL:
    full_name: Island Line
    color:
      $ref: '#/color_names/ocean_blue'
  KTL:
    full_name: Kwun Tong Line
    color:
      $ref: '#/color_names/green'
  LRT:
    full_name: Light Rail
    color:
      $ref: '#/color_names/gold'
  SIL:
    full_name: South Island Line
    color:
      $ref: '#/color_names/light_green'
  TCL:
    full_name: Tung Chung Line
    color:
      $ref: '#/color_names/orange'
  TKL:
    full_name: Tseung Kwan O Line
    color:
      $ref: '#/color_names/purple'
